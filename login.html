<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PropManage SaaS</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-main) 0%, var(--primary-light) 100%);
            padding: 1rem;
            box-sizing: border-box;
        }
        
        .glass-login-card {
            position: relative;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 3rem;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
        }

        @media (max-width: 480px) {
            .glass-login-card {
                padding: 2.5rem 1.5rem;
                margin-top: 3.5rem;
            }
            .top-toggles {
                top: 1rem !important;
                right: 1rem !important;
                gap: 0.5rem !important;
            }
            .top-toggle-btn {
                width: 35px !important;
                height: 35px !important;
            }
            .logo span {
                font-size: 1.25rem !important;
            }
        }
        
        @media (min-width: 768px) {
            .top-toggles {
                position: fixed !important;
                top: 2rem !important;
                right: 2rem !important;
            }
        }
        
        [data-theme="dark"] .glass-login-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        [data-theme="dark"] .social-btn {
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }
        
        [data-theme="dark"] .top-toggle-btn {
            background: rgba(30, 41, 59, 0.8) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }
    </style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

    <!-- Theme & RTL Toggles (Top Right of Page) -->
    <div class="top-toggles" style="position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 1rem; z-index: 10;">
        <button id="theme-toggle" class="icon-btn top-toggle-btn" aria-label="Toggle Dark Mode" style="background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.1); cursor: pointer; color: var(--text-color);"><i class="fas fa-moon"></i></button>
        <button id="rtl-toggle" class="icon-btn top-toggle-btn" aria-label="Toggle RTL" style="background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.1); cursor: pointer; color: var(--text-color);"><i class="fas fa-exchange-alt"></i></button>
    </div>

    <div class="glass-login-card" data-aos="fade-up">

        <div class="text-center mb-4">
            <a href="index.html" class="logo justify-center mb-3" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--primary);">
                <i class="fas fa-building fa-2x"></i>
                <span style="font-size: 1.5rem; font-weight: bold;">PropManage</span>
            </a>
            <h2>Welcome Back</h2>
            <p>Log in to your dashboard.</p>
        </div>
        
        <form action="dashboard.html">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <input type="password" class="form-control" placeholder="••••••••" required style="padding-right: 2.5rem;">
                    <i class="fas fa-eye" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);" onclick="const input = this.previousElementSibling; if (input.type === 'password') { input.type = 'text'; this.classList.remove('fa-eye'); this.classList.add('fa-eye-slash'); } else { input.type = 'password'; this.classList.remove('fa-eye-slash'); this.classList.add('fa-eye'); }"></i>
                </div>
            </div>
            <div class="form-group mb-4" style="display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="remember">
                    <label for="remember" style="margin: 0; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; white-space: nowrap;">Remember me</label>
                </div>
                <a href="#" style="font-size: 0.8rem; white-space: nowrap;">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            
            <p class="text-center" style="font-size: 0.9rem; margin-top: 1.5rem;">
                Don't have an account? <a href="register.html">Start your free trial</a>
            </p>
            
            <div class="mt-4">
                <div style="display: flex; align-items: center; text-align: center; color: var(--text-muted); margin-bottom: 1rem;">
                    <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
                    <span style="padding: 0 10px; font-size: 0.875rem;">or continue with</span>
                    <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
                </div>
                
                <div style="display: flex; gap: 1rem;">
                    <button type="button" class="btn btn-outline social-btn" style="flex: 1; display: flex; justify-content: center; gap: 0.5rem; background: transparent; border: 1px solid var(--border-color); padding: 0.75rem; border-radius: var(--radius-md); cursor: pointer; color: var(--text-color);">
                        <i class="fab fa-google" style="color: #DB4437;"></i> Google
                    </button>
                    <button type="button" class="btn btn-outline social-btn" style="flex: 1; display: flex; justify-content: center; gap: 0.5rem; background: transparent; border: 1px solid var(--border-color); padding: 0.75rem; border-radius: var(--radius-md); cursor: pointer; color: var(--text-color);">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
